---
name: Organization-Wide Issue Notifications

"on":
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'org-wide')

    steps:
      - name: Process Organization-Wide Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // 1. Determine severity and urgency
            let priority = 'normal';
            let emoji = 'đź“˘';

            if (labels.some(l => l.includes('urgent') || l.includes('critical'))) {
              priority = 'urgent';
              emoji = 'đźš¨';
            } else if (labels.some(l => l.includes('high-priority') || l.includes('security'))) {
              priority = 'high';
              emoji = 'âš ď¸Ź';
            }

            // 2. Post comment with notification info
            console.log(`Processing issue #${issue.number} with priority ${priority}`);

            let message = `${emoji} **Organization-Wide Issue Alert**\n\n`;
            message += `This issue has been tagged as organization-wide and will be tracked centrally.\n\n`;
            message += `**Priority:** ${priority}\n`;
            message += `**Labels:** ${labels.join(', ')}\n\n`;

            if (priority === 'urgent') {
              message += `âš ď¸Ź This is marked as **URGENT** and requires immediate attention from relevant teams.\n\n`;
            }

            message += `### Next Steps:\n`;
            message += `- [ ] Review and triage this issue\n`;
            message += `- [ ] Identify affected teams and repositories\n`;
            message += `- [ ] Create linked issues in affected repositories if needed\n`;
            message += `- [ ] Add to relevant project boards\n\n`;
            message += `---\n`;
            message += `*This notification was automatically generated. Teams can subscribe to notifications by watching this repository.*`;

            await github.rest.issues.createComment({
              issue_number: issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

            // 3. Project integration placeholder
            console.log('Project integration can be configured with organization projects');

            // 4. Create notification summary
            await core.summary
              .addHeading(`${emoji} Organization-Wide Issue Notification`, 2)
              .addRaw(`**Issue:** #${issue.number} - ${issue.title}\n`)
              .addRaw(`**Author:** @${issue.user.login}\n`)
              .addRaw(`**Priority:** ${priority}\n`)
              .addRaw(`**Labels:** ${labels.join(', ')}\n\n`)
              .addLink('đź”— View Issue', issue.html_url)
              .addRaw('\n\n### Notification Methods\n')
              .addList([
                'Comment added to issue',
                'Notification sent to repository watchers',
                'Summary generated for workflow visibility'
              ])
              .write();
