name: Organization-Wide Issue Notifications

"on":
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'org-wide')

    steps:
      - name: Process Org-Wide Issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const labelStr = labels.join(', ');

            // Determine priority
            let priority = 'normal';
            let emoji = '📢';

            // Check for urgent/critical
            const isUrgent = labels.some(l =>
              l.includes('urgent') || l.includes('critical')
            );

            // Check for high/security
            const isHigh = labels.some(l =>
              l.includes('high-priority') || l.includes('security')
            );

            if (isUrgent) {
              priority = 'urgent';
              emoji = '🚨';
            } else if (isHigh) {
              priority = 'high';
              emoji = '⚠️';
            }

            // Construct comment
            let body = `${emoji} **Organization-Wide Issue Alert**\n\n`;
            body += 'This issue has been tagged as organization-wide ';
            body += 'and will be tracked centrally.\n\n';
            body += `**Priority:** ${priority}\n`;
            body += `**Labels:** ${labelStr}\n\n`;

            if (priority === 'urgent') {
              body += '⚠️ This is marked as **URGENT** and requires ';
              body += 'immediate attention from relevant teams.\n\n';
            }

            body += '### Next Steps:\n';
            body += '- [ ] Review and triage this issue\n';
            body += '- [ ] Identify affected teams and repositories\n';
            body += '- [ ] Create linked issues in affected repositories\n';
            body += '- [ ] Add to relevant project boards\n\n';
            body += '---\n';
            body += '*This notification was automatically generated.*';

            await github.rest.issues.createComment({
              issue_number: issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

            // Project integration placeholder
            console.log('Project integration can be configured here.');

            // Create summary
            await core.summary
              .addHeading('📢 Organization-Wide Issue Notification', 2)
              .addRaw(`**Issue:** #${issue.number} - ${issue.title}\n`)
              .addRaw(`**Author:** @${issue.user.login}\n`)
              .addRaw(`**Priority:** ${priority}\n`)
              .addRaw(`**Labels:** ${labelStr}\n\n`)
              .addLink('View Issue', issue.html_url)
              .addRaw('\n\n### Notification Methods\n')
              .addList([
                'Comment added to issue',
                'Notification sent to repository watchers',
                'Summary generated for workflow visibility'
              ])
              .write();
