---
name: Organization-Wide Issue Notifications

"on":
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'org-wide')

    steps:
      - name: Process Notification and Summary
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // Determine Priority
            let priority = 'normal';
            let emoji = '📢';

            const isUrgent = labels.some(
              l => l.includes('urgent') || l.includes('critical')
            );
            const isHigh = labels.some(
              l => l.includes('high-priority') || l.includes('security')
            );

            if (isUrgent) {
              priority = 'urgent';
              emoji = '🚨';
            } else if (isHigh) {
              priority = 'high';
              emoji = '⚠️';
            }

            // Post Comment
            let msg = `${emoji} **Organization-Wide Issue Alert**\n\n`;
            msg += 'This issue has been tagged as organization-wide ';
            msg += 'and will be tracked centrally.\n\n';
            msg += `**Priority:** ${priority}\n`;
            msg += `**Labels:** ${labels.join(', ')}\n\n`;

            if (priority === 'urgent') {
              msg += '⚠️ This is marked as **URGENT** and requires ';
              msg += 'immediate attention from relevant teams.\n\n';
            }

            msg += `### Next Steps:\n`;
            msg += `- [ ] Review and triage this issue\n`;
            msg += `- [ ] Identify affected teams and repositories\n`;
            msg += `- [ ] Create linked issues in affected repositories\n`;
            msg += `- [ ] Add to relevant project boards\n\n`;
            msg += `---\n`;
            msg += '*This notification was automatically generated. ';
            msg += 'Teams can subscribe to notifications ';
            msg += 'by watching this repository.*';

            await github.rest.issues.createComment({
              issue_number: issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: msg
            });

            // Generate Summary
            await core.summary
              .addHeading('📢 Organization-Wide Issue Notification', 2)
              .addRaw(`**Issue:** #${issue.number} - ${issue.title}\n`)
              .addRaw(`**Author:** @${issue.user.login}\n`)
              .addRaw(`**Priority:** ${priority}\n`)
              .addRaw(`**Labels:** ${labels.join(', ')}\n\n`)
              .addLink('🔗 View Issue', issue.html_url)
              .addRaw('\n\n### Notification Methods\n')
              .addList([
                'Comment added to issue',
                'Notification sent to repository watchers',
                'Summary generated for workflow visibility'
              ])
              .write();

      - name: Add to project (if configured)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            // This is a placeholder for adding issues to GitHub Projects
            // Configure PROJECT_ID in repository secrets to enable this
            console.log(
              'Project integration can be configured with organization projects'
            );
