---
name: Organization-Wide Issue Notifications

"on":
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'org-wide')

    steps:
      - name: Send notification and summary
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            const issueUrl = issue.html_url;
            const issueAuthor = issue.user.login;

            // Helper to check for substring matches in labels
            const hasLabel = (keywords) =>
              labels.some(label => keywords.some(k => label.includes(k)));

            // Determine priority
            let priority = 'normal';
            let emoji = '📢';

            if (hasLabel(['urgent', 'critical'])) {
              priority = 'urgent';
              emoji = '🚨';
            } else if (hasLabel(['high-priority', 'security'])) {
              priority = 'high';
              emoji = '⚠️';
            }

            // Construct message
            let message = `${emoji} **Organization-Wide Issue Alert**\n\n`;
            message += `This issue has been tagged as organization-wide ` +
              `and will be tracked centrally.\n\n`;
            message += `**Priority:** ${priority}\n`;
            message += `**Labels:** ${labels.join(', ')}\n\n`;

            if (priority === 'urgent') {
              message += `⚠️ This is marked as **URGENT** and requires ` +
                `immediate attention from relevant teams.\n\n`;
            }

            message += `### Next Steps:\n`;
            message += `- [ ] Review and triage this issue\n`;
            message += `- [ ] Identify affected teams and repositories\n`;
            message += `- [ ] Create linked issues in affected repositories\n`;
            message += `- [ ] Add to relevant project boards\n\n`;
            message += `---\n`;
            message += `*This notification was automatically generated. ` +
              `Teams can subscribe to notifications by watching ` +
              `this repository.*`;

            // Post comment
            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

            // Create Summary
            await core.summary
              .addHeading('📢 Organization-Wide Issue Notification', 2)
              .addRaw(`**Issue:** #${issueNumber} - ${issueTitle}\n`)
              .addRaw(`**Author:** @${issueAuthor}\n`)
              .addRaw(`**Priority:** ${priority}\n`)
              .addRaw(`**Labels:** ${labels.join(', ')}\n\n`)
              .addLink('View Issue', issueUrl)
              .addRaw('\n\n### Notification Methods\n')
              .addList([
                'Comment added to issue',
                'Notification sent to repository watchers',
                'Summary generated for workflow visibility'
              ])
              .write();

      - name: Add to project (if configured)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            // This is a placeholder for adding issues to GitHub Projects
            // Configure PROJECT_ID in repository secrets to enable this
            console.log('Project integration can be configured with ' +
              'organization projects');
