---
name: Organization-Wide Issue Notifications

"on":
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'org-wide')

    steps:
      - name: Process organization-wide issue
        uses: actions/github-script@v7
        with:
          script: |
            // Consolidates categorization, commenting, and summary generation
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // Determine priority
            let priority = 'normal';
            let emoji = '📢';

            const urgentLabels = ['urgent', 'critical'];
            const highLabels = ['high-priority', 'security'];

            if (labels.some(l => urgentLabels.some(u => l.includes(u)))) {
              priority = 'urgent';
              emoji = '🚨';
            } else if (labels.some(l => highLabels.some(h => l.includes(h)))) {
              priority = 'high';
              emoji = '⚠️';
            }

            // Post comment
            let message = `${emoji} **Organization-Wide Issue Alert**\n\n`;
            message += `This issue has been tagged as organization-wide `;
            message += `and will be tracked centrally.\n\n`;
            message += `**Priority:** ${priority}\n`;
            message += `**Labels:** ${labels.join(', ')}\n\n`;

            if (priority === 'urgent') {
              message += `⚠️ This is marked as **URGENT** and requires `;
              message += `immediate attention from relevant teams.\n\n`;
            }

            message += `### Next Steps:\n`;
            message += `- [ ] Review and triage this issue\n`;
            message += `- [ ] Identify affected teams and repositories\n`;
            message += `- [ ] Create linked issues in affected repositories\n`;
            message += `- [ ] Add to relevant project boards\n\n`;
            message += `---\n`;
            message += `*This notification was automatically generated. `;
            message += `Teams can subscribe to notifications by watching `;
            message += `this repository.*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

            // Generate Summary
            await core.summary
              .addHeading('📢 Organization-Wide Issue Notification')
              .addTable([
                [
                  {data: 'Issue', header: true},
                  {data: `#${issue.number} - ${issue.title}`}
                ],
                [
                  {data: 'Author', header: true},
                  {data: `@${issue.user.login}`}
                ],
                [
                  {data: 'Priority', header: true},
                  {data: `${emoji} ${priority}`}
                ],
                [
                  {data: 'Labels', header: true},
                  {data: labels.join(', ')}
                ]
              ])
              .addLink('View Issue', issue.html_url)
              .addHeading('Notification Methods', 3)
              .addList([
                'Comment added to issue',
                'Notification sent to repository watchers',
                'Summary generated for workflow visibility'
              ])
              .write();

      - name: Add to project (if configured)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            // This is a placeholder for adding issues to GitHub Projects
            // Configure PROJECT_ID in repository secrets to enable this
            console.log('Project integration can be configured with projects');
