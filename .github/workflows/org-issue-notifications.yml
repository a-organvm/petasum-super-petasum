name: Organization-Wide Issue Notifications

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'org-wide')

    steps:
      - name: Process organization-wide issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const author = issue.user.login;

            console.log(`Processing issue #${issue.number}: ${issue.title}`);

            // Determine priority
            let priority = 'normal';
            let emoji = '📢';

            const urgent = ['urgent', 'critical'];
            const high = ['high-priority', 'security'];

            if (labels.some(l => urgent.some(k => l.includes(k)))) {
              priority = 'urgent';
              emoji = '🚨';
            } else if (labels.some(l => high.some(k => l.includes(k)))) {
              priority = 'high';
              emoji = '⚠️';
            }

            console.log(`Categorized as: ${priority} (${emoji})`);

            // Construct comment
            let message = `${emoji} **Organization-Wide Issue Alert**\n\n`;
            message += `This issue has been tagged as organization-wide ` +
                       `and will be tracked centrally.\n\n`;
            message += `**Priority:** ${priority}\n`;
            message += `**Labels:** ${labels.join(', ')}\n\n`;

            if (priority === 'urgent') {
              message += `⚠️ This is marked as **URGENT** and requires ` +
                         `immediate attention from relevant teams.\n\n`;
            }

            message += `### Next Steps:\n`;
            message += `- [ ] Review and triage this issue\n`;
            message += `- [ ] Identify affected teams and repositories\n`;
            message += `- [ ] Create linked issues in affected repositories\n`;
            message += `- [ ] Add to relevant project boards\n\n`;
            message += `---\n`;
            message += `*This notification was automatically generated. Teams ` +
                       `can subscribe to notifications by watching this ` +
                       `repository.*`;

            // Post comment
            await github.rest.issues.createComment({
              issue_number: issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

            // Generate Summary
            await core.summary
              .addHeading('📢 Organization-Wide Issue Notification')
              .addRaw(`**Issue:** #${issue.number} - ${issue.title}\n`)
              .addRaw(`**Author:** @${author}\n`)
              .addRaw(`**Priority:** ${priority}\n`)
              .addRaw(`**Labels:** ${labels.join(', ')}\n\n`)
              .addLink('🔗 View Issue', issue.html_url)
              .addRaw('\n\n### Notification Methods\n')
              .addList([
                'Comment added to issue',
                'Notification sent to repository watchers',
                'Summary generated for workflow visibility'
              ])
              .write();

      - name: Add to project (if configured)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            // This is a placeholder for adding issues to GitHub Projects
            // Configure PROJECT_ID in repository secrets to enable this
            console.log('Project integration can be configured');
