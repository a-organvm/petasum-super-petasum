name: Organization-Wide Issue Notifications

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  notify:
    if: contains(github.event.issue.labels.*.name, 'org-wide')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Classify issue priority
        id: categorize
        run: |
          LABELS="${{ join(github.event.issue.labels.*.name, ',') }}"
          echo "labels=${LABELS}" >> "$GITHUB_OUTPUT"
          if echo "$LABELS" | grep -Eq "urgent|critical"; then
            echo "priority=urgent" >> "$GITHUB_OUTPUT"
            echo "emoji=🚨" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -Eq "high-priority|security"; then
            echo "priority=high" >> "$GITHUB_OUTPUT"
            echo "emoji=⚠️" >> "$GITHUB_OUTPUT"
          else
            echo "priority=normal" >> "$GITHUB_OUTPUT"
            echo "emoji=📢" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment notification summary
        uses: actions/github-script@v8
        with:
          script: |
            const priority = '${{ steps.categorize.outputs.priority }}';
            const emoji = '${{ steps.categorize.outputs.emoji }}';
            const labels = '${{ steps.categorize.outputs.labels }}';
            const body = [
              `${emoji} **Organization-Wide Issue Alert**`,
              '',
              `Priority: **${priority}**`,
              `Labels: ${labels || 'none'}`,
              '',
              'This issue has been tagged as organization-wide and logged for cross-repo visibility.'
            ].join('\\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Add run summary
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          PRIORITY: ${{ steps.categorize.outputs.priority }}
          LABELS: ${{ steps.categorize.outputs.labels }}
        run: |
          {
            echo "## Organization-Wide Issue Notification"
            echo ""
            echo "**Issue:** #${ISSUE_NUMBER} - ${ISSUE_TITLE}"
            echo "**Priority:** ${PRIORITY}"
            echo "**Labels:** ${LABELS}"
            echo ""
            echo "[View issue](${ISSUE_URL})"
          } >> "$GITHUB_STEP_SUMMARY"
