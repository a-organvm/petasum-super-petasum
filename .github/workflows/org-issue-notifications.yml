name: Organization-Wide Issue Notifications

"on":
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'org-wide')

    steps:
      - name: Process Notification
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const labelStr = labels.join(',');

            let priority = 'normal';
            let emoji = '📢';

            if (/urgent|critical/.test(labelStr)) {
              priority = 'urgent';
              emoji = '🚨';
            } else if (/high-priority|security/.test(labelStr)) {
              priority = 'high';
              emoji = '⚠️';
            }

            // Construct Message
            let message = `${emoji} **Organization-Wide Issue Alert**\n\n`;
            message += `This issue has been tagged as organization-wide and `;
            message += `will be tracked centrally.\n\n`;
            message += `**Priority:** ${priority}\n`;
            message += `**Labels:** ${labels.join(', ')}\n\n`;

            if (priority === 'urgent') {
              message += `⚠️ This is marked as **URGENT** and requires `;
              message += `immediate attention from relevant teams.\n\n`;
            }

            message += `### Next Steps:\n`;
            message += `- [ ] Review and triage this issue\n`;
            message += `- [ ] Identify affected teams and repositories\n`;
            message += `- [ ] Create linked issues in affected repositories `;
            message += `if needed\n`;
            message += `- [ ] Add to relevant project boards\n\n`;
            message += `---\n`;
            message += `*This notification was automatically generated. Teams `;
            message += `can subscribe to notifications by watching this `;
            message += `repository.*`;

            await github.rest.issues.createComment({
              issue_number: issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

            // Create Summary
            await core.summary
              .addHeading("📢 Organization-Wide Issue Notification", 2)
              .addRaw(`**Issue:** #${issue.number} - ${issue.title}`)
              .addRaw(`**Author:** @${issue.user.login}`)
              .addRaw(`**Priority:** ${priority}`)
              .addRaw(`**Labels:** ${labels.join(', ')}`)
              .addRaw("")
              .addLink("View Issue", issue.html_url)
              .addRaw("")
              .addHeading("Notification Methods", 3)
              .addList([
                "Comment added to issue",
                "Notification sent to repository watchers",
                "Summary generated for workflow visibility"
              ])
              .write();

      - name: Add to project (if configured)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            // This is a placeholder for adding issues to GitHub Projects
            // Configure PROJECT_ID in repository secrets to enable this
            console.log('Project integration can be configured with ' +
              'organization projects');
