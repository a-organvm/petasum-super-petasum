---
name: Organization-Wide Issue Notifications

"on":
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'org-wide')

    steps:
      - name: Process organization-wide issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labelNames = issue.labels.map(l => l.name);

            // 1. Determine severity and urgency
            let priority = 'normal';
            let emoji = '📢';

            if (labelNames.some(n => n.includes('urgent') ||
                n.includes('critical'))) {
              priority = 'urgent';
              emoji = '🚨';
            } else if (labelNames.some(n => n.includes('high-priority') ||
                n.includes('security'))) {
              priority = 'high';
              emoji = '⚠️';
            }

            console.log(`Determined priority: ${priority}`);

            // 2. Post comment
            let message = `${emoji} **Organization-Wide Issue Alert**\n\n`;
            message += `This issue has been tagged as organization-wide ` +
              `and will be tracked centrally.\n\n`;
            message += `**Priority:** ${priority}\n`;
            message += `**Labels:** ${labelNames.join(', ')}\n\n`;

            if (priority === 'urgent') {
              message += `⚠️ This is marked as **URGENT** and requires ` +
                `immediate attention from relevant teams.\n\n`;
            }

            message += `### Next Steps:\n`;
            message += `- [ ] Review and triage this issue\n`;
            message += `- [ ] Identify affected teams and repositories\n`;
            message += `- [ ] Create linked issues in affected repositories\n`;
            message += `- [ ] Add to relevant project boards\n\n`;
            message += `---\n`;
            message += `*This notification was automatically generated. ` +
              `Teams can subscribe to notifications by watching this repo.*`;

            await github.rest.issues.createComment({
              issue_number: issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

            // 3. Add to project (placeholder log)
            console.log('Project integration can be configured with ' +
              'org projects');

            // 4. Create summary
            await core.summary
              .addHeading('📢 Organization-Wide Issue Notification', 2)
              .addRaw(`**Issue:** #${issue.number} - ${issue.title}\n`)
              .addRaw(`**Author:** @${issue.user.login}\n`)
              .addRaw(`**Priority:** ${priority}\n`)
              .addRaw(`**Labels:** ${labelNames.join(', ')}\n\n`)
              .addLink('View Issue', issue.html_url)
              .addHeading('Notification Methods', 3)
              .addList([
                'Comment added to issue',
                'Notification sent to repository watchers',
                'Summary generated for workflow visibility'
              ])
              .write();
