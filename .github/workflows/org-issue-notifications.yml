name: Organization-Wide Issue Notifications

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'org-wide')

    steps:
      - name: Process organization-wide issue
        uses: actions/github-script@v7
        with:
          script: |
            // Access payload directly to avoid injection
            const issue = context.payload.issue;

            if (!issue || !issue.labels) {
              console.log('No issue or labels found.');
              return;
            }

            // Extract label names
            const labels = issue.labels.map(l => l.name);
            console.log('Labels:', labels);

            // Determine priority and emoji
            let priority = 'normal';
            let emoji = '📢';

            // Check for urgent/critical
            if (labels.some(l => l.includes('urgent') || l.includes('critical'))) {
              priority = 'urgent';
              emoji = '🚨';
            }
            // Check for high/security
            else if (labels.some(l => l.includes('high-priority') || l.includes('security'))) {
              priority = 'high';
              emoji = '⚠️';
            }

            console.log(`Determined priority: ${priority}, emoji: ${emoji}`);

            // Build the message
            let message = `${emoji} **Organization-Wide Issue Alert**\n\n`;
            message += `This issue has been tagged as organization-wide and will be tracked centrally.\n\n`;
            message += `**Priority:** ${priority}\n`;
            message += `**Labels:** ${labels.join(', ')}\n\n`;

            if (priority === 'urgent') {
              message += `⚠️ This is marked as **URGENT** and requires immediate attention from relevant teams.\n\n`;
            }

            message += `### Next Steps:\n`;
            message += `- [ ] Review and triage this issue\n`;
            message += `- [ ] Identify affected teams and repositories\n`;
            message += `- [ ] Create linked issues in affected repositories if needed\n`;
            message += `- [ ] Add to relevant project boards\n\n`;
            message += `---\n`;
            message += `*This notification was automatically generated. Teams can subscribe to notifications by watching this repository.*`;

            // Post comment
            await github.rest.issues.createComment({
              issue_number: issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

            // Generate Summary
            await core.summary
              .addHeading('📢 Organization-Wide Issue Notification', 2)
              .addTable([
                [{data: 'Issue', header: true}, {data: `#${issue.number} - ${issue.title}`, header: false}],
                [{data: 'Author', header: true}, {data: `@${issue.user.login}`, header: false}],
                [{data: 'Priority', header: true}, {data: priority, header: false}],
                [{data: 'Labels', header: true}, {data: labels.join(', '), header: false}],
              ])
              .addLink('View Issue', issue.html_url)
              .addHeading('Notification Methods', 3)
              .addList([
                'Comment added to issue',
                'Notification sent to repository watchers',
                'Summary generated for workflow visibility'
              ])
              .write();

      - name: Add to project (if configured)
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            // This is a placeholder for adding issues to GitHub Projects
            // Configure PROJECT_ID in repository secrets to enable this
            console.log('Project integration can be configured with organization projects');
